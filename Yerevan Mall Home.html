<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yerevan Mall — Home</title>
<script src="image-slot.js"></script>
<style>
  :root{
    --bg:#E9EDF2;
    --card:#FFFFFF;
    --ink:#11161C;
    --muted:#8A929C;
    --line:#EAEDF1;
    --orange:#F26B1F;
    --green:#34B27B;
    --purple:#8B6BD9;
    --blue:#4C8DF5;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:#c8 ;
    background:#cfd6de;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
  }
  .phone{
    width:390px;height:844px;
    background:var(--bg);
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;
    box-shadow:0 30px 80px rgba(20,28,40,.28);
  }

  /* ===== status bar ===== */
  .status{
    height:54px;flex:0 0 54px;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px 0;
    font-size:15px;font-weight:600;color:var(--ink);
  }
  .status .time{display:flex;align-items:center;gap:5px;letter-spacing:.2px;}
  .status .time svg{display:block;}
  .status .icons{display:flex;align-items:center;gap:6px;}
  .status .icons svg{display:block;}

  /* ===== scroll body ===== */
  .screen{flex:1;overflow-y:auto;overflow-x:hidden;}
  .screen::-webkit-scrollbar{display:none;}

  /* ===== header ===== */
  .header{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 20px 14px;
  }
  .brand{
    font-size:17px;font-weight:800;letter-spacing:1.2px;color:var(--ink);white-space:nowrap;
  }
  .bell{
    width:42px;height:42px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 10px rgba(30,41,59,.06);
  }

  .section-title{
    font-size:21px;font-weight:800;color:var(--ink);letter-spacing:.2px;
  }
  .news-head{padding:2px 20px 12px;}

  /* ===== promo card ===== */
  .promo-wrap{padding:0 16px;}
  .promo{
    position:relative;border-radius:18px;overflow:hidden;
    background:linear-gradient(180deg,#EAEDE9 0%,#E4E8E3 100%);
    height:158px;
    box-shadow:0 6px 18px rgba(30,41,59,.08);
  }
  .promo .rings{
    position:absolute;right:-40px;bottom:-70px;width:240px;height:240px;
    opacity:.5;
  }
  .promo .kp-logo{
    position:absolute;top:14px;left:16px;
    display:flex;align-items:center;gap:5px;
    font-size:11px;font-weight:800;color:#1d2b22;letter-spacing:.3px;
  }
  .promo .kp-logo .leaf{
    width:15px;height:15px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#7ed957,#36a832);
    position:relative;
  }
  .promo .copy{
    position:absolute;left:16px;top:46px;right:140px;
  }
  .promo .copy h2{
    font-size:23px;line-height:1.02;font-weight:800;color:#1b2630;
    letter-spacing:.3px;
  }
  .promo .copy p{
    margin-top:8px;font-size:9px;line-height:1.35;font-weight:700;color:#3a4751;
    letter-spacing:.2px;max-width:150px;
  }
  .promo .stores{
    position:absolute;left:16px;bottom:14px;display:flex;gap:7px;
  }
  .promo .badge{
    height:22px;border-radius:5px;background:#111;
    display:flex;align-items:center;gap:4px;padding:0 8px;
    color:#fff;font-size:8px;font-weight:600;
  }
  .promo .badge svg{display:block;}
  .promo .badge .b-sub{font-size:6px;opacity:.8;line-height:1;}
  .promo .badge .b-main{font-size:9px;font-weight:700;line-height:1.05;}
  .promo-illus{
    position:absolute;right:8px;bottom:0;width:150px;height:150px;
  }

  .dots{display:flex;gap:6px;justify-content:center;padding:12px 0 2px;}
  .dots span{width:6px;height:6px;border-radius:50%;background:#c2cad3;}
  .dots span.on{width:18px;border-radius:3px;background:var(--orange);}

  /* ===== quick actions ===== */
  .quick{
    display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
    padding:8px 16px 4px;
  }
  .qa{
    background:#fff;border-radius:14px;padding:14px 6px 11px;
    display:flex;flex-direction:column;align-items:center;gap:9px;
    box-shadow:0 3px 12px rgba(30,41,59,.05);
  }
  .qa .ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
  .qa span{font-size:10.5px;font-weight:600;color:#2b333c;text-align:center;line-height:1.2;}

  /* ===== stores ===== */
  .stores-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 20px 12px;
  }
  .show-all{
    display:flex;align-items:center;gap:3px;
    color:var(--orange);font-size:13px;font-weight:700;white-space:nowrap;
  }
  .store-row{
    display:grid;grid-template-columns:repeat(4,1fr);gap:11px;
    padding:0 16px;
  }
  .store{
    position:relative;background:#fff;border-radius:14px;height:74px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 12px rgba(30,41,59,.05);overflow:hidden;
  }
  .ribbon{
    position:absolute;top:0;left:11px;width:13px;height:18px;
    background:var(--orange);
    clip-path:polygon(0 0,100% 0,100% 100%,50% 80%,0 100%);
  }
  .store .zara{font-family:"Times New Roman",Georgia,serif;font-weight:700;font-size:20px;letter-spacing:1px;color:#111;}
  .store .uspolo{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .store .uspolo .horse{font-size:15px;}
  .store .uspolo small{font-size:5.5px;font-weight:700;letter-spacing:.3px;color:#0a2a52;}
  .levis{background:#E32219;color:#fff;font-family:"Times New Roman",Georgia,serif;font-style:italic;font-weight:700;font-size:17px;padding:3px 8px;border-radius:2px;letter-spacing:.3px;}
  .store .mac{font-family:"Times New Roman",Georgia,serif;font-weight:600;font-size:17px;letter-spacing:2px;color:#111;}

  /* ===== card toggle ===== */
  .toggle{
    display:flex;gap:34px;padding:26px 24px 10px;
  }
  .toggle .t{font-size:15px;font-weight:700;color:#aab2bc;position:relative;padding-bottom:9px;white-space:nowrap;}
  .toggle .t.on{color:var(--orange);}
  .toggle .t.on::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:2.5px;border-radius:2px;background:var(--orange);
  }

  .pad-bottom{height:18px;}

  /* ===== bottom nav ===== */
  .nav{
    flex:0 0 auto;background:#fff;
    display:grid;grid-template-columns:repeat(5,1fr);
    padding:10px 10px 22px;
    box-shadow:0 -2px 20px rgba(30,41,59,.06);
  }
  .nav a{
    display:flex;flex-direction:column;align-items:center;gap:5px;
    color:#aab2bc;font-size:10px;font-weight:600;text-decoration:none;
  }
  .nav a.on{color:var(--ink);}
  .nav a svg{display:block;}
</style>
</head>
<body>

    <!-- status bar -->
