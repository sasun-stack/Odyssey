<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="god-styles.css">

<script>
/* Only enable entrance animations if the CSS animation timeline actually
   advances. Some non-interactive render contexts paint frames but freeze
   the timeline (animations stuck at 0% = invisible). A tiny probe detects
   real motion; if absent, content stays visibly static. */
(function(){
  var probe=document.createElement('div');
  probe.style.cssText='position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0;animation:__probe .001s linear forwards;';
  document.documentElement.appendChild(probe);
  var tries=0;
  (function poll(){
    tries++;
    if(parseFloat(getComputedStyle(probe).opacity)>0.5){
      document.documentElement.classList.add('anim'); probe.remove(); return;
    }
    if(tries>10){ probe.remove(); return; }
    setTimeout(poll,110);
  })();
})();
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="god-data.jsx"></script>
<script type="text/babel" src="god-screens.jsx"></script>

  </svg>
</template>
